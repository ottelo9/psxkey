<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif" role="img">
  <title>PSXKEY LPT (DB25) to PSX controller socket wiring</title>
  <desc>Wiring from a DB25 parallel port to a PlayStation controller socket. Socket pins run 9 (left) to 1 (right). DB25 pin 2 to PSX pin 2 (CMD), DB25 pin 3 to PSX pin 6 (ATT), DB25 pin 4 to PSX pin 7 (CLK), DB25 pins 7-9 through diodes to PSX pin 5 (VCC), DB25 pin 10 to PSX pin 1 (DATA), DB25 pins 18-25 to PSX pin 4 (GND). PSX pins 3, 8 and 9 are unused.</desc>

  <rect x="1" y="1" width="898" height="698" rx="12" fill="#ffffff" stroke="#d0d7de" stroke-width="2"/>
  <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2328">PSXKEY &#8212; LPT (DB25) &#8594; PSX controller socket</text>

  <!-- ================= DB25 (top) ================= -->
  <path d="M178,80 L722,80 Q730,80 728,88 L717,142 Q715,150 707,150 L193,150 Q185,150 183,142 L172,88 Q170,80 178,80 Z"
        fill="#b6bec7" stroke="#7d8792" stroke-width="2"/>
  <path d="M192,90 L708,90 Q713,90 712,96 L703,136 Q702,141 697,141 L203,141 Q198,141 197,136 L188,96 Q187,90 192,90 Z"
        fill="#2f3439"/>

  <!-- top row pins -->
  <g fill="#8d949c">
    <circle cx="205" cy="105" r="4.5"/><circle cx="365" cy="105" r="4.5"/><circle cx="405" cy="105" r="4.5"/>
    <circle cx="605" cy="105" r="4.5"/><circle cx="645" cy="105" r="4.5"/><circle cx="685" cy="105" r="4.5"/>
  </g>
  <circle cx="245" cy="105" r="5.5" fill="#e8710a" stroke="#ffffff" stroke-width="1.2"/>
  <circle cx="285" cy="105" r="5.5" fill="#0969da" stroke="#ffffff" stroke-width="1.2"/>
  <circle cx="325" cy="105" r="5.5" fill="#8250df" stroke="#ffffff" stroke-width="1.2"/>
  <circle cx="445" cy="105" r="5.5" fill="#cf222e" stroke="#ffffff" stroke-width="1.2"/>
  <circle cx="485" cy="105" r="5.5" fill="#cf222e" stroke="#ffffff" stroke-width="1.2"/>
  <circle cx="525" cy="105" r="5.5" fill="#cf222e" stroke="#ffffff" stroke-width="1.2"/>
  <circle cx="565" cy="105" r="5.5" fill="#1a7f37" stroke="#ffffff" stroke-width="1.2"/>

  <!-- bottom row pins -->
  <g fill="#8d949c">
    <circle cx="225" cy="131" r="4.5"/><circle cx="265" cy="131" r="4.5"/><circle cx="305" cy="131" r="4.5"/>
    <circle cx="345" cy="131" r="4.5"/>
  </g>
  <g fill="#57606a" stroke="#ffffff" stroke-width="1.2">
    <circle cx="385" cy="131" r="5"/><circle cx="425" cy="131" r="5"/><circle cx="465" cy="131" r="5"/>
    <circle cx="505" cy="131" r="5"/><circle cx="545" cy="131" r="5"/><circle cx="585" cy="131" r="5"/>
    <circle cx="625" cy="131" r="5"/><circle cx="665" cy="131" r="5"/>
  </g>
  <text x="450" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#57606a">DB25 male &#8212; LPT parallel port (front view)</text>

  <g font-size="12" font-weight="700" text-anchor="middle">
    <text x="245" y="70" fill="#e8710a">2</text>
    <text x="285" y="70" fill="#0969da">3</text>
    <text x="325" y="70" fill="#8250df">4</text>
    <text x="485" y="70" fill="#cf222e">7-9</text>
    <text x="565" y="70" fill="#1a7f37">10</text>
  </g>
  <line x1="445" y1="74" x2="525" y2="74" stroke="#cf222e" stroke-width="1.5"/>

  <!-- ================= wires ================= -->
  <!-- CLK  DB25 4 -> PSX 7 -->
  <path d="M325,150 C325,300 351,370 351,500" fill="none" stroke="#8250df" stroke-width="3"/>
  <!-- ATT  DB25 3 -> PSX 6 -->
  <path d="M285,150 C285,300 413,370 413,500" fill="none" stroke="#0969da" stroke-width="3"/>
  <!-- GND  DB25 18-25 -> PSX 4 -->
  <path d="M665,150 C665,300 487,360 487,500" fill="none" stroke="#57606a" stroke-width="3"/>
  <!-- CMD  DB25 2 -> PSX 2 -->
  <path d="M245,150 C245,300 586,360 586,500" fill="none" stroke="#e8710a" stroke-width="3"/>
  <!-- DATA DB25 10 -> PSX 1 -->
  <path d="M565,150 C565,300 623,370 623,500" fill="none" stroke="#1a7f37" stroke-width="3"/>

  <!-- +V  DB25 7,8,9 through diodes -> merge -> PSX 5 -->
  <g stroke="#cf222e" stroke-width="2.5" fill="none">
    <line x1="445" y1="150" x2="445" y2="166"/><line x1="485" y1="150" x2="485" y2="166"/><line x1="525" y1="150" x2="525" y2="166"/>
    <line x1="445" y1="186" x2="445" y2="205"/><line x1="485" y1="186" x2="485" y2="205"/><line x1="525" y1="186" x2="525" y2="205"/>
    <line x1="445" y1="205" x2="525" y2="205"/>
  </g>
  <g fill="#cf222e">
    <path d="M439,167 L451,167 L445,180 Z"/><path d="M479,167 L491,167 L485,180 Z"/><path d="M519,167 L531,167 L525,180 Z"/>
  </g>
  <g stroke="#cf222e" stroke-width="2.5">
    <line x1="437" y1="182" x2="453" y2="182"/><line x1="477" y1="182" x2="493" y2="182"/><line x1="517" y1="182" x2="533" y2="182"/>
  </g>
  <path d="M485,205 C485,330 450,390 450,500" fill="none" stroke="#cf222e" stroke-width="3"/>

  <!-- ================= PSX socket (square top corners, heavily rounded bottom) ================= -->
  <!-- housing -->
  <path d="M230,500 L670,500 L670,550 Q670,600 620,600 L280,600 Q230,600 230,550 Z"
        fill="#1c1c1e" stroke="#000000" stroke-width="2"/>
  <path d="M238,508 L662,508 L662,550 Q662,592 620,592 L280,592 Q238,592 238,550 Z" fill="#141416"/>
  <!-- recessed cavity -->
  <path d="M248,518 L652,518 L652,550 Q652,582 620,582 L280,582 Q248,582 248,550 Z"
        fill="#08080a" stroke="#2a2a2e" stroke-width="1.5"/>
  <!-- key notch (top centre) -->
  <path d="M424,519 Q437,527 450,524 Q463,527 476,519" fill="none" stroke="#9aa0a6" stroke-width="2.5" stroke-linecap="round"/>

  <!-- three contact blocks of three pins -->
  <g fill="#232326" stroke="#3a3a3f" stroke-width="1.2">
    <rect x="258" y="534" width="112" height="32" rx="5"/>
    <rect x="394" y="534" width="112" height="32" rx="5"/>
    <rect x="530" y="534" width="112" height="32" rx="5"/>
  </g>

  <!-- pin holes: unused (9, 8, 3) -->
  <g fill="#050506" stroke="#4a4a50" stroke-width="1.2">
    <circle cx="277" cy="550" r="5.5"/><circle cx="314" cy="550" r="5.5"/><circle cx="549" cy="550" r="5.5"/>
  </g>
  <!-- pin holes: wired -->
  <g fill="#050506" stroke-width="2.5">
    <circle cx="351" cy="550" r="5.5" stroke="#8250df"/>
    <circle cx="413" cy="550" r="5.5" stroke="#0969da"/>
    <circle cx="450" cy="550" r="5.5" stroke="#cf222e"/>
    <circle cx="487" cy="550" r="5.5" stroke="#57606a"/>
    <circle cx="586" cy="550" r="5.5" stroke="#e8710a"/>
    <circle cx="623" cy="550" r="5.5" stroke="#1a7f37"/>
  </g>
  <g fill="#5c5c63">
    <circle cx="275" cy="548" r="1.4"/><circle cx="312" cy="548" r="1.4"/><circle cx="349" cy="548" r="1.4"/>
    <circle cx="411" cy="548" r="1.4"/><circle cx="448" cy="548" r="1.4"/><circle cx="485" cy="548" r="1.4"/>
    <circle cx="547" cy="548" r="1.4"/><circle cx="584" cy="548" r="1.4"/><circle cx="621" cy="548" r="1.4"/>
  </g>

  <!-- wire termination dots on the socket edge -->
  <g>
    <circle cx="351" cy="500" r="4.5" fill="#8250df"/><circle cx="413" cy="500" r="4.5" fill="#0969da"/>
    <circle cx="450" cy="500" r="4.5" fill="#cf222e"/><circle cx="487" cy="500" r="4.5" fill="#57606a"/>
    <circle cx="586" cy="500" r="4.5" fill="#e8710a"/><circle cx="623" cy="500" r="4.5" fill="#1a7f37"/>
  </g>

  <!-- socket pin numbers + functions (9 left ... 1 right) -->
  <g text-anchor="middle" font-size="11">
    <text x="277" y="622" font-weight="700" fill="#8a9098">9</text><text x="277" y="637" fill="#8a9098">ACK</text>
    <text x="314" y="622" font-weight="700" fill="#8a9098">8</text><text x="314" y="637" fill="#8a9098">n/c</text>
    <text x="351" y="622" font-weight="700" fill="#8250df">7</text><text x="351" y="637" fill="#57606a">CLK</text>
    <text x="413" y="622" font-weight="700" fill="#0969da">6</text><text x="413" y="637" fill="#57606a">ATT</text>
    <text x="450" y="622" font-weight="700" fill="#cf222e">5</text><text x="450" y="637" fill="#57606a">VCC</text>
    <text x="487" y="622" font-weight="700" fill="#57606a">4</text><text x="487" y="637" fill="#57606a">GND</text>
    <text x="549" y="622" font-weight="700" fill="#8a9098">3</text><text x="549" y="637" fill="#8a9098">n/c</text>
    <text x="586" y="622" font-weight="700" fill="#e8710a">2</text><text x="586" y="637" fill="#57606a">CMD</text>
    <text x="623" y="622" font-weight="700" fill="#1a7f37">1</text><text x="623" y="637" fill="#57606a">DATA</text>
  </g>
  <text x="450" y="660" text-anchor="middle" font-size="12" font-weight="700" fill="#57606a">PSX controller socket &#8212; front view (pin 9 left &#8230; pin 1 right)</text>

  <!-- ================= legend ================= -->
  <g font-size="11" fill="#1f2328">
    <rect x="34" y="676" width="11" height="11" rx="2" fill="#1a7f37"/><text x="51" y="686">DATA  10&#8594;1</text>
    <rect x="164" y="676" width="11" height="11" rx="2" fill="#e8710a"/><text x="181" y="686">CMD  2&#8594;2</text>
    <rect x="284" y="676" width="11" height="11" rx="2" fill="#0969da"/><text x="301" y="686">ATT  3&#8594;6</text>
    <rect x="399" y="676" width="11" height="11" rx="2" fill="#8250df"/><text x="416" y="686">CLK  4&#8594;7</text>
    <rect x="514" y="676" width="11" height="11" rx="2" fill="#cf222e"/><text x="531" y="686">+V  7-9&#8594;5 (3 diodes)</text>
    <rect x="700" y="676" width="11" height="11" rx="2" fill="#57606a"/><text x="717" y="686">GND  18-25&#8594;4</text>
  </g>
</svg>
